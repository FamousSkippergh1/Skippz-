<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FS Predictor — Warning</title>
<style>
body{
  font-family: monospace;
  background: #020617;
  color:#00ff9f;
  text-align:center;
  padding:15px;
}

/* WARNING BOX */
.warning-box{
  max-width:900px;
  margin:50px auto;
  padding:16px 20px;
  background:#111;
  border-left:6px solid #22c55e;
  border-radius:12px;
  font-size:15px;
  line-height:1.6;
  box-shadow:0 8px 20px rgba(0,255,159,0.2);
}

/* BUTTON */
.open-bot-btn{
  display:block;
  margin:35px auto;
  padding:15px 30px;
  font-size:17px;
  font-weight:bold;
  color:#000;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  border:none;
  border-radius:14px;
  cursor:pointer;
  box-shadow:0 10px 22px rgba(34,197,94,0.35);
  transition:all 0.25s ease;
}

.open-bot-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 14px 28px rgba(34,197,94,0.45);
}
</style>
</head>
<body>

<div class="warning-box">
⚠️ <strong>Risk Disclaimer:</strong> FS Predictor provides probability-based signals. 
Results may vary. Always trade responsibly.
</div>

<button class="open-bot-btn" onclick="location.href='bot.html'">🚀 Open Real Bot</button>

</body>
</html>
